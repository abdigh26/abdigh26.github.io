title: Somali OSINT Brief
description: Somali OSINT Brief delivers open-source intelligence and risk analysis on Somalia and the Horn of Africa for humanitarian organizations, diplomatic missions, logistics providers, and security professionals.
url: "https://abdigh26.github.io"
baseurl: ""
author: Abdi Haji
email: abdihaji@warsawuni.edu.pl
# build: 2

# Build
markdown: kramdown
highlighter: rouge

# Collections
collections:
  reports:
    output: true
    permalink: /reports/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      permalink: /:year/:month/:day/:title/
  - scope:
      path: ""
      type: "reports"
    values:
      layout: "report"

# Exclude
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
