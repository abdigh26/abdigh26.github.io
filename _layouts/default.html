<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Tokens ─────────────────────────────────────────────── */
    :root {
      --bg:         #0a0a0c;
      --bg-card:    #111116;
      --bg-raised:  #17171e;
      --border:     #222230;
      --accent:     #c8a96e;        /* worn-gold — field intelligence */
      --accent-dim: #7a6540;
      --red:        #c0392b;
      --text:       #e2e2e8;
      --text-dim:   #7a7a90;
      --text-faint: #3a3a50;
      --font-display: 'Syne', sans-serif;
      --font-body:    'Inter', sans-serif;
      --font-mono:    'IBM Plex Mono', monospace;
      --max:        1100px;
      --radius:     3px;
    }

    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.7;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* ── Nav ────────────────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,12,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }
    .nav-inner {
      max-width: var(--max);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .nav-logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.01em;
      color: var(--text);
      white-space: nowrap;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }

    /* ── Layout wrapper ─────────────────────────────────────── */
    .site-main {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ── Hero ───────────────────────────────────────────────── */
    .hero {
      padding: 6rem 0 4rem;
      border-bottom: 1px solid var(--border);
    }
    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }
    .hero-headline {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 1.5rem;
    }
    .hero-sub {
      max-width: 560px;
      color: var(--text-dim);
      font-size: 1.05rem;
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }
    .hero-cta { display: flex; gap: 1rem; flex-wrap: wrap; }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn-primary {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--accent);
      color: #0a0a0c;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Stat bar ───────────────────────────────────────────── */
    .stat-bar {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 2rem 0;
      border-bottom: 1px solid var(--border);
    }
    .stat { flex: 1; text-align: center; }
    .stat-num {
      display: block;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--accent);
    }
    .stat-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .stat-divider {
      width: 1px;
      height: 40px;
      background: var(--border);
    }

    /* ── Sections ───────────────────────────────────────────── */
    .section { padding: 4rem 0; border-bottom: 1px solid var(--border); }
    .section-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-bottom: 2rem;
    }

    /* ── Cards ──────────────────────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }
    .card {
      background: var(--bg-card);
      padding: 2rem;
      display: block;
      transition: background 0.2s;
    }
    .card:hover { background: var(--bg-raised); }
    .card-tag {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .card-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.15rem;
      line-height: 1.3;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .card-meta {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-faint);
      margin-bottom: 0.75rem;
    }
    .card-excerpt { color: var(--text-dim); font-size: 0.9rem; }

    /* ── Article list ───────────────────────────────────────── */
    .article-list { display: flex; flex-direction: column; }
    .article-row {
      display: grid;
      grid-template-columns: 100px 1fr 24px;
      align-items: center;
      gap: 1.5rem;
      padding: 1.25rem 0;
      border-bottom: 1px solid var(--border);
      transition: color 0.2s;
    }
    .article-row:hover { color: var(--accent); }
    .article-date {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-faint);
      white-space: nowrap;
    }
    .article-title { font-size: 0.95rem; color: var(--text); }
    .article-arrow { color: var(--text-faint); font-size: 0.9rem; }
    .article-row:hover .article-arrow { color: var(--accent); }
    .view-all {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--accent-dim);
      margin-top: 1.5rem;
      display: inline-block;
      transition: color 0.2s;
    }
    .view-all:hover { color: var(--accent); }

    /* ── Dashboard promo ────────────────────────────────────── */
    .section--dashboard-promo { border-bottom: none; }
    .dashboard-promo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 3rem;
    }
    .dashboard-promo h2 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.6rem;
      margin-bottom: 1rem;
    }
    .dashboard-promo p {
      color: var(--text-dim);
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
    .dashboard-promo-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }
    .mini-stat {
      background: var(--bg-raised);
      padding: 1.25rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ── Post / Report layout ───────────────────────────────── */
    .post-header {
      padding: 4rem 0 3rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }
    .post-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .post-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }
    .post-meta {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--text-faint);
    }
    .post-body {
      max-width: 720px;
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--text-dim);
    }
    .post-body h2 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--text);
      margin: 2.5rem 0 1rem;
    }
    .post-body h3 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--text);
      margin: 2rem 0 0.75rem;
    }
    .post-body p { margin-bottom: 1.5rem; }
    .post-body strong { color: var(--text); font-weight: 500; }
    .post-body a { color: var(--accent); border-bottom: 1px solid var(--accent-dim); }
    .post-body blockquote {
      border-left: 2px solid var(--accent);
      padding-left: 1.5rem;
      margin: 2rem 0;
      color: var(--text-dim);
      font-style: italic;
    }
    .post-body code {
      font-family: var(--font-mono);
      font-size: 0.85em;
      background: var(--bg-raised);
      padding: 0.1em 0.4em;
      border-radius: 2px;
    }

    /* ── Footer ─────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2.5rem 2rem;
      margin-top: 4rem;
    }
    .footer-inner {
      max-width: var(--max);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-brand {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    .footer-brand span { color: var(--accent-dim); }
    .footer-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .footer-links a {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-faint);
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--accent); }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 700px) {
      nav { padding: 0 1rem; }
      .nav-links { gap: 1rem; }
      .nav-links li:nth-child(n+4) { display: none; }
      .site-main { padding: 0 1rem; }
      .hero { padding: 3rem 0 2.5rem; }
      .stat-bar { flex-wrap: wrap; gap: 1.5rem; }
      .stat-divider { display: none; }
      .dashboard-promo { grid-template-columns: 1fr; gap: 2rem; padding: 1.5rem; }
      .article-row { grid-template-columns: 80px 1fr; }
      .article-arrow { display: none; }
      .footer-inner { flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-logo">Somali<span>.</span>OSINT Brief</a>
      <ul class="nav-links">
        <li><a href="/reports/">Reports</a></li>
        <li><a href="/articles/">Articles</a></li>
        <li><a href="/dashboard/">Dashboard</a></li>
        <li><a href="/about/">About</a></li>
      </ul>
    </div>
  </nav>

  <main class="site-main">
    {{ content }}
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-brand">
        Somali OSINT Brief — <span>Ground-level data meets grand strategy</span>
      </div>
      <ul class="footer-links">
        <li><a href="/reports/">Reports</a></li>
        <li><a href="/articles/">Articles</a></li>
        <li><a href="/dashboard/">Dashboard</a></li>
      </ul>
    </div>
  </footer>
</body>
</html>
