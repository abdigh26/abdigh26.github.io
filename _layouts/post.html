---
layout: default
---

<article>
  <header class="post-header">
    <div class="post-eyebrow">{{ page.category | default: "Analysis" | upcase }}</div>
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">{{ page.date | date: "%d %B %Y" }} — Abdi Haji</div>
  </header>
  <div class="post-body">
    {{ content }}
  </div>
</article>
